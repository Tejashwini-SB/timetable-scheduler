{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block page_header %}<div class="page-header"><div><h1 class="page-title"><i class="bi bi-key me-2 text-primary"></i>Change Password</h1></div><a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a></div>{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-lg-5"><div class="card"><div class="card-body"><form method="post" novalidate>{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors.0 }}</div>{% endif %}</div>{% endfor %}<button type="submit" class="btn btn-primary w-100">Update Password</button></form></div></div></div></div>{% endblock %}
