<header class="top-navbar">
    <div class="navbar-left">
        <button class="sidebar-mobile-toggle d-lg-none" id="mobileSidebarToggle">
            <i class="bi bi-list"></i>
        </button>
        <button class="sidebar-desktop-toggle d-none d-lg-flex" id="desktopSidebarToggle">
            <i class="bi bi-layout-sidebar"></i>
        </button>
        <nav aria-label="breadcrumb" class="d-none d-md-flex align-items-center ms-3">
            {% block navbar_breadcrumb %}{% endblock %}
        </nav>
    </div>
    <div class="navbar-right">
        <!-- Academic Year Badge -->
        {% with year=request.session.academic_year %}
        <div class="d-none d-sm-flex align-items-center">
            <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill">
                <i class="bi bi-calendar3 me-1"></i>
                <span id="currentYear">Academic Year</span>
            </span>
        </div>
        {% endwith %}

        <!-- Notifications placeholder -->
        <div class="nav-action-btn" title="Notifications">
            <i class="bi bi-bell"></i>
        </div>

        <!-- User dropdown -->
        <div class="dropdown">
            <button class="user-dropdown-btn" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="avatar-sm">
                    {% if user.profile_picture %}
                        <img src="{{ user.profile_picture.url }}" alt="{{ user.username }}" class="rounded-circle">
                    {% else %}
                        <span>{{ user.first_name|first|upper }}{{ user.last_name|first|upper }}</span>
                    {% endif %}
                </div>
                <span class="d-none d-md-inline">{{ user.get_full_name|default:user.username }}</span>
                <i class="bi bi-chevron-down"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0">
                <li><h6 class="dropdown-header">{{ user.email }}</h6></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                        <i class="bi bi-person-circle me-2"></i>Profile
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="{% url 'accounts:change_password' %}">
                        <i class="bi bi-key me-2"></i>Change Password
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</header>
