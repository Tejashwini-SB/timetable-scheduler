{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_header %}<div class="page-header"><div><h1 class="page-title">{{ title }}</h1></div><a href="{% url 'timetable:timeslot_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a></div>{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-lg-5"><div class="card"><div class="card-body"><form method="post" novalidate>{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors.0 }}</div>{% endif %}</div>{% endfor %}<div class="d-flex gap-2"><button type="submit" class="btn btn-primary">{{ action }}</button><a href="{% url 'timetable:timeslot_list' %}" class="btn btn-outline-secondary">Cancel</a></div></form></div></div></div></div>{% endblock %}
