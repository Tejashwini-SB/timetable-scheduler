services:
  - type: web
    name: timetable-scheduler
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn timetable_scheduler.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: timetable-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: timetable-db
    plan: free
    databaseName: timetable_db
    user: timetable_user
